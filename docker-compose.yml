version: '3.9'

services:
  aigc-reducer:
    build: .
    container_name: aigc-reducer
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      FLASK_ENV: ${FLASK_ENV:-production}
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
    restart: unless-stopped
